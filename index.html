<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Skins</title>

<style>

body{
background:#0f1115;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#1c2027;
padding:15px 30px;
display:flex;
align-items:center;
gap:20px;
}

.logo{
font-size:20px;
color:#5cc8ff;
}

nav button{
background:none;
border:none;
color:#ccc;
margin-right:15px;
cursor:pointer;
font-size:14px;
}

nav button:hover{
color:white;
}

.container{
padding:30px;
}

#search{
padding:10px;
border-radius:6px;
border:none;
background:#1c2027;
color:white;
margin-bottom:20px;
width:250px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1c2027;
padding:15px;
border-radius:10px;
transition:.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:120px;
object-fit:contain;
}

.name{
margin-top:10px;
font-size:14px;
}

.price{
color:#4ade80;
margin:6px 0;
}

button.inspect{
background:#3b82f6;
border:none;
padding:8px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<div class="logo">CS2 Skins</div>

<nav>
<button onclick="filterCategory('Pistols')">Pistols</button>
<button onclick="filterCategory('Rifles')">Rifles</button>
<button onclick="filterCategory('SMGs')">SMGs</button>
<button onclick="filterCategory('Shotguns')">Shotguns</button>
<button onclick="filterCategory('Knives')">Knives</button>
<button onclick="filterCategory('Gloves')">Gloves</button>
<button onclick="filterCategory('All')">All</button>
</nav>

</header>

<div class="container">

<input id="search" placeholder="Buscar skin...">

<div class="grid" id="skins"></div>

</div>

<script>

let skins=[]
let filtered=[]

async function loadSkins(){

const res = await fetch("https://raw.githubusercontent.com/ByMykel/CSGO-API/main/public/api/en/skins.json")
skins = await res.json()

filtered = skins.slice(0,300)

render()

}

function render(){

const container=document.getElementById("skins")
container.innerHTML=""

filtered.forEach(skin=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${skin.image}">

<div class="name">${skin.name}</div>

<div class="price">Steam Market</div>

<button class="inspect" onclick="inspect()">
Inspect
</button>

`

container.appendChild(card)

})

}

function filterCategory(cat){

if(cat==="All"){
filtered=skins.slice(0,300)
}else{

filtered=skins.filter(s=>{
if(!s.category) return false
return s.category.name.includes(cat)
}).slice(0,300)

}

render()

}

document.getElementById("search").addEventListener("input",e=>{

const term=e.target.value.toLowerCase()

filtered=skins.filter(s=>
s.name.toLowerCase().includes(term)
).slice(0,300)

render()

})

function inspect(){
alert("Para inspect real necesitas un inspect link de inventario")
}

loadSkins()

</script>

</body>
</html>
